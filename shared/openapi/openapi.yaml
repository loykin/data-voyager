openapi: 3.0.3

info:
  title: Data Voyager API
  version: 0.1.0
  description: Data Voyager REST API

servers:
  - url: /api/v1
    description: API v1

tags:
  - name: datasources
    description: Datasource management
  - name: settings
    description: Application settings management
  - name: ai-configs
    description: AI provider configuration management

paths:
  /datasources:
    get:
      operationId: listDatasources
      summary: List all datasources
      tags: [datasources]
      parameters:
        - in: query
          name: type
          schema:
            type: string
          description: Filter by datasource type
        - in: query
          name: enabled
          schema:
            type: boolean
          description: Filter by active status
        - in: query
          name: createdBy
          schema:
            type: string
          description: Filter by creator
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasourceListResponse"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: createDatasource
      summary: Create a datasource
      tags: [datasources]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDatasourceRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasourceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /datasources/{uid}:
    parameters:
      - in: path
        name: uid
        required: true
        schema:
          type: string
          format: uuid

    get:
      operationId: getDatasource
      summary: Get a datasource by UID
      tags: [datasources]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasourceResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      operationId: updateDatasource
      summary: Update a datasource
      tags: [datasources]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDatasourceRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasourceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      operationId: deleteDatasource
      summary: Delete a datasource
      tags: [datasources]
      responses:
        "204":
          description: No Content
        "500":
          $ref: "#/components/responses/InternalError"

  /datasources/test:
    post:
      operationId: testDatasourceConfig
      summary: Test datasource options without saving
      tags: [datasources]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestDatasourceRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasourceTestResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /datasources/{uid}/test:
    parameters:
      - in: path
        name: uid
        required: true
        schema:
          type: string
          format: uuid
    post:
      operationId: testDatasource
      summary: Test a datasource
      tags: [datasources]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasourceTestResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /datasources/{uid}/schema:
    parameters:
      - in: path
        name: uid
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getDatasourceSchema
      summary: Get datasource schema for a datasource
      tags: [datasources]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasourceSchemaResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "501":
          $ref: "#/components/responses/NotImplemented"

  /datasources/{uid}/query:
    parameters:
      - in: path
        name: uid
        required: true
        schema:
          type: string
          format: uuid
    post:
      operationId: queryDatasource
      summary: Execute a query through a datasource
      tags: [datasources]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "501":
          $ref: "#/components/responses/NotImplemented"
        "502":
          $ref: "#/components/responses/BadGateway"

  /datasources/{uid}/query/batch:
    parameters:
      - in: path
        name: uid
        required: true
        schema:
          type: string
          format: uuid
    post:
      operationId: batchQueryDatasource
      summary: Execute multiple queries through a datasource and return all results
      tags: [datasources]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchQueryRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchQueryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "501":
          $ref: "#/components/responses/NotImplemented"
        "502":
          $ref: "#/components/responses/BadGateway"

  /datasource-types:
    get:
      operationId: listDatasourceTypes
      summary: List supported datasource types
      tags: [datasources]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasourceTypesResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /datasource-stats:
    get:
      operationId: getDatasourceStats
      summary: Get datasource statistics
      tags: [datasources]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasourceStatsResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /datasources/history:
    get:
      operationId: listDatasourceHistory
      summary: List all datasource change history (requires statistics_store)
      tags: [datasources]
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 500
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasourceHistoryListResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /datasources/{uid}/history:
    parameters:
      - in: path
        name: uid
        required: true
        schema:
          type: string
          format: uuid

    get:
      operationId: listDatasourceHistoryByDatasource
      summary: List change history for a specific datasource
      tags: [datasources]
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 500
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasourceHistoryListResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /ai-configs:
    get:
      operationId: listAIConfigs
      summary: List all AI provider optionss (no api_key values)
      tags: [ai-configs]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIConfigListResponse"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: createAIConfig
      summary: Create an AI provider options
      tags: [ai-configs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAIConfigRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIConfigResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /ai-configs/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string

    get:
      operationId: getAIConfig
      summary: Get an AI config by ID
      tags: [ai-configs]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIConfigResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      operationId: updateAIConfig
      summary: Update an AI config (empty api_key keeps existing)
      tags: [ai-configs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAIConfigRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIConfigResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      operationId: deleteAIConfig
      summary: Delete an AI config
      tags: [ai-configs]
      responses:
        "204":
          description: No Content
        "500":
          $ref: "#/components/responses/InternalError"

  /ai-configs/{id}/activate:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string

    post:
      operationId: activateAIConfig
      summary: Set the active AI config (clears others)
      tags: [ai-configs]
      responses:
        "204":
          description: No Content
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /ai-configs/history:
    get:
      operationId: listAIConfigHistory
      summary: List all AI config change history (requires statistics_store)
      tags: [ai-configs]
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 500
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIConfigHistoryListResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /ai-configs/{id}/history:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string

    get:
      operationId: listAIConfigHistoryByConfig
      summary: List change history for a specific AI config
      tags: [ai-configs]
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 500
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIConfigHistoryListResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /settings/ai:
    get:
      operationId: getAISettings
      summary: Get current AI settings (no secret values)
      tags: [settings]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AISettingsData"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      operationId: updateAISettings
      summary: Save AI settings (empty api_key keeps existing value)
      tags: [settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAISettingsRequest"
      responses:
        "204":
          description: No Content
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  schemas:
    Datasource:
      type: object
      required: [uid, name, type, options, enabled, createdAt, updatedAt]
      properties:
        uid:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          description: Datasource type identifier (e.g. "postgresql", "clickhouse")
        options:
          type: object
          additionalProperties: true
          description: Driver-specific datasource options
          x-go-type: json.RawMessage
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        meta:
          type: object
          additionalProperties: true

    DatasourceTestResult:
      type: object
      required: [ok, message]
      properties:
        ok:
          type: boolean
        message:
          type: string
        latencyMs:
          type: integer
          format: int64
        testedAt:
          type: string
          format: date-time

    DatasourceStats:
      type: object
      required: [totalCount, activeCount, countByType]
      properties:
        totalCount:
          type: integer
          format: int64
        activeCount:
          type: integer
          format: int64
        countByType:
          type: object
          additionalProperties:
            type: integer
            format: int64

    CreateDatasourceRequest:
      type: object
      required: [name, type, options]
      properties:
        name:
          type: string
          minLength: 1
        type:
          type: string
          minLength: 1
        options:
          type: object
          additionalProperties: true
        meta:
          type: object
          additionalProperties: true

    UpdateDatasourceRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        options:
          type: object
          additionalProperties: true
        meta:
          type: object
          additionalProperties: true
        enabled:
          type: boolean

    TestDatasourceRequest:
      type: object
      required: [type, options]
      properties:
        type:
          type: string
          minLength: 1
        options:
          type: object
          additionalProperties: true

    TimeRange:
      type: object
      properties:
        from:
          type: string
          description: >
            Start of the time range. Accepts ISO 8601 ("2024-04-01T00:00:00Z"),
            Unix ms as a numeric string ("1712160000000"),
            or a relative expression ("1 Hours ago").
        to:
          type: string
          description: >
            End of the time range. Accepts the same formats as "from", plus "Now".

    QueryRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
          description: >
            Raw query template. Server-side {{ variable }} substitution is
            applied before execution. Built-in variables (__ prefix) are
            injected automatically from time_range.
        variables:
          type: object
          additionalProperties: true
          description: User-defined variables for {{ }} template substitution.
        time_range:
          $ref: "#/components/schemas/TimeRange"
        limit:
          type: integer
          default: 10000

    QueryStats:
      type: object
      required: [executionTimeMs, rowsReturned]
      properties:
        executionTimeMs:
          type: integer
          format: int64
        rowsReturned:
          type: integer
          format: int64
        bytesRead:
          type: integer
          format: int64

    QueryInspect:
      type: object
      required: [rawQuery, executedQuery]
      properties:
        rawQuery:
          type: string
          description: Original template before variable substitution.
        executedQuery:
          type: string
          description: Final query after all variable substitution.
        variables:
          type: object
          additionalProperties: true
          description: Full context used for substitution (including built-in __ variables).

    FieldKind:
      type: string
      description: Semantic type of a field, used for rendering (axis selection, formatting).
      enum: [time, number, string, boolean]

    FrameType:
      type: string
      description: Hint for how the DataFrame should be visualized.
      enum: [table, time_series, logs]

    Field:
      type: object
      required: [name, kind, values]
      properties:
        name:
          type: string
        kind:
          $ref: "#/components/schemas/FieldKind"
        type:
          type: string
          description: Native database type string (display only).
        labels:
          type: object
          additionalProperties:
            type: string
          description: Key-value labels attached to the field (e.g. Prometheus metric labels).
        values:
          type: array
          items: {}

    DataFrame:
      type: object
      required: [frameType, fields]
      properties:
        name:
          type: string
        frameType:
          $ref: "#/components/schemas/FrameType"
        fields:
          type: array
          items:
            $ref: "#/components/schemas/Field"

    QueryResult:
      type: object
      required: [frames]
      properties:
        frames:
          type: array
          items:
            $ref: "#/components/schemas/DataFrame"

    # Response envelopes
    DatasourceResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Datasource"

    DatasourceListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Datasource"

    DatasourceTestResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/DatasourceTestResult"

    DatasourceTypesResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            type: string

    DatasourceStatsResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/DatasourceStats"

    DatasourceHistory:
      type: object
      required: [id, datasourceUid, datasourceName, datasourceType, action, changedAt]
      properties:
        id:
          type: string
        datasourceUid:
          type: string
        datasourceName:
          type: string
        datasourceType:
          type: string
        action:
          type: string
          enum: [created, updated, deleted]
        changedAt:
          type: string
          format: date-time

    DatasourceHistoryListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/DatasourceHistory"

    DatasourceSchemaResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          additionalProperties: true

    QueryResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/QueryResult"
        stats:
          $ref: "#/components/schemas/QueryStats"
        inspect:
          $ref: "#/components/schemas/QueryInspect"

    BatchQueryItem:
      type: object
      required: [id, request]
      properties:
        id:
          type: string
          description: Query identifier (e.g. "A", "B"). Returned in results.
        request:
          $ref: "#/components/schemas/QueryRequest"

    BatchQueryRequest:
      type: object
      required: [queries]
      properties:
        queries:
          type: array
          items:
            $ref: "#/components/schemas/BatchQueryItem"
          minItems: 1

    BatchQueryResultItem:
      type: object
      required: [id]
      properties:
        id:
          type: string
        data:
          $ref: "#/components/schemas/QueryResult"
        stats:
          $ref: "#/components/schemas/QueryStats"
        inspect:
          $ref: "#/components/schemas/QueryInspect"
        error:
          type: string
          description: Per-query error message if this query failed.

    BatchQueryResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/BatchQueryResultItem"

    # AI settings schemas
    ClaudeSettingsResponse:
      type: object
      properties:
        api_key_set:
          type: boolean
        model:
          type: string
        base_url:
          type: string

    OpenAISettingsResponse:
      type: object
      properties:
        api_key_set:
          type: boolean
        model:
          type: string
        base_url:
          type: string

    CopilotSettingsResponse:
      type: object
      properties:
        api_key_set:
          type: boolean
        model:
          type: string
        base_url:
          type: string

    OllamaSettingsResponse:
      type: object
      properties:
        model:
          type: string
        base_url:
          type: string

    # AI Config schemas (new dynamic CRUD system)
    AIConfig:
      type: object
      required: [id, name, provider, api_key_set, model, base_url, is_active, created_at, updated_at]
      properties:
        id:
          type: string
        name:
          type: string
        provider:
          type: string
          enum: [claude, openai, copilot, ollama]
        api_key_set:
          type: boolean
          description: Whether an API key has been stored (key value never returned)
        model:
          type: string
        base_url:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateAIConfigRequest:
      type: object
      required: [name, provider]
      properties:
        name:
          type: string
          minLength: 1
        provider:
          type: string
          enum: [claude, openai, copilot, ollama]
        api_key:
          type: string
        model:
          type: string
        base_url:
          type: string

    UpdateAIConfigRequest:
      type: object
      properties:
        name:
          type: string
        provider:
          type: string
          enum: [claude, openai, copilot, ollama]
        api_key:
          type: string
          description: Empty string keeps existing key
        model:
          type: string
        base_url:
          type: string

    AIConfigResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/AIConfig"

    AIConfigListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AIConfig"

    AIConfigHistory:
      type: object
      required: [id, config_id, config_name, provider, action, changed_at]
      properties:
        id:
          type: string
        config_id:
          type: string
        config_name:
          type: string
        provider:
          type: string
        action:
          type: string
          enum: [created, updated, deleted, activated]
        changed_at:
          type: string
          format: date-time

    AIConfigHistoryListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AIConfigHistory"

    AISettingsData:
      type: object
      required: [enabled, provider]
      properties:
        enabled:
          type: boolean
        provider:
          type: string
        claude:
          $ref: "#/components/schemas/ClaudeSettingsResponse"
        openai:
          $ref: "#/components/schemas/OpenAISettingsResponse"
        copilot:
          $ref: "#/components/schemas/CopilotSettingsResponse"
        ollama:
          $ref: "#/components/schemas/OllamaSettingsResponse"

    AISettingsResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/AISettingsData"

    ClaudeSettingsInput:
      type: object
      properties:
        api_key:
          type: string
          description: Empty string keeps the existing key
        model:
          type: string
        base_url:
          type: string

    OpenAISettingsInput:
      type: object
      properties:
        api_key:
          type: string

[server]
host = "localhost"
port = 8080
read_timeout = 30
write_timeout = 30
max_body_size = 10485760

[metadata_store]
type = "sqlite"
migrate_on_start = true

[metadata_store.sqlite]
path = "./data/data-voyager.db"

 [statistics_store]
 type = "sqlite"                  # sqlite | postgresql | mysql | clickhouse  (leave empty to disable)
 migrate_on_start = true

 [statistics_store.sqlite]
 path = "./data/statistics.db"
#
# [statistics_store.postgresql]
# host     = "localhost"
# port     = 5432
# database = "voyager_stats"
# user     = "postgres"
# password = ""
# ssl_mode = "disable"
#
# [statistics_store.mysql]
# host     = "localhost"
# port     = 3306
# database = "voyager_stats"
# user     = "root"
# password = ""
#
# [statistics_store.clickhouse]
# host     = "localhost"
# tcp_port = 9000
# database = "voyager_stats"
# username = "default"
# password = ""

[logging]
level = "info"
format = "text"
output = "stdout"

[security]
enable_cors = true
allowed_origins = ["*"]
allowed_methods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
allowed_headers = ["Origin", "Content-Type", "Accept", "Authorization"]
rate_limit_rps = 100
enable_auth = false
session_timeout = 3600

[ai]
enabled  = false
provider = "claude"   # claude | openai | copilot | ollama

[ai.claude]
api_key  = ""         # or set env DV_AI_CLAUDE_API_KEY
model    = "claude-3-5-sonnet-20241022"
base_url = ""         # optional override

[ai.openai]
api_key  = ""
base_url = "https://api.openai.com/v1"
model    = "gpt-4o"

[ai.copilot]
api_key  = ""         # GitHub Copilot token
base_url = "https://api.githubcopilot.com"
model    = "gpt-4o"

[ai.ollama]
base_url = "http://localhost:11434/v1"
model    = "qwen2.5-coder:7b"
